<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux.2 Image Generator • OpenRouter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .image-container { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .image-container:hover, .image-container:focus-visible { transform: scale(1.02); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl" aria-hidden="true">✦</div>
                <div>
                    <h1 class="title text-4xl font-semibold tracking-tighter">Flux.2</h1>
                    <p class="text-zinc-400 -mt-1">via OpenRouter API</p>
                </div>
            </div>
            <div class="flex items-center gap-6 text-sm">
                <a href="https://openrouter.ai/docs/guides/overview/multimodal/image-generation" target="_blank"
                   class="flex items-center gap-2 hover:text-white focus-visible:text-white transition-colors"
                   aria-label="OpenRouter documentation">
                    <i class="fa-solid fa-book" aria-hidden="true"></i> Docs
                </a>
                <button onclick="clearApiKey()"
                     class="flex items-center gap-2 text-amber-400 hover:text-amber-300 focus-visible:text-amber-300 transition-colors"
                     aria-label="Manage API key">
                    <i class="fa-solid fa-key" aria-hidden="true"></i>
                    <span id="key-status" class="font-mono text-xs">API KEY</span>
                </button>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Controls -->
            <div class="lg:col-span-4 bg-zinc-900 rounded-3xl p-8">
                <div class="space-y-8">
                    <!-- API Key -->
                    <div>
                        <label for="api-key" class="text-xs uppercase tracking-widest text-zinc-500 mb-2 block">OpenRouter API Key</label>
                        <div class="relative">
                            <input id="api-key" type="password"
                                   class="w-full bg-zinc-950 border border-zinc-700 focus:border-violet-500 rounded-2xl px-5 py-4 text-sm font-mono outline-none transition-colors"
                                   placeholder="sk-or-..."
                                   aria-label="OpenRouter API Key">
                            <button onclick="toggleKeyVisibility()"
                                    class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white focus-visible:text-white"
                                    aria-label="Toggle API key visibility">
                                <i id="eye-icon" class="fa-solid fa-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                        <p class="text-[10px] text-zinc-500 mt-2">
                            Warning: Stored only in your browser (localStorage). Never share this page.
                        </p>
                    </div>
                    <!-- Model -->
                    <div>
                        <label for="model" class="text-xs uppercase tracking-widest text-zinc-500 mb-2 block">Model</label>
                        <select id="model"
                                class="w-full bg-zinc-950 border border-zinc-700 focus:border-violet-500 rounded-2xl px-5 py-4 text-sm outline-none">
                            <option value="black-forest-labs/flux.2-pro">Flux.2 Pro (highest quality)</option>
                            <option value="black-forest-labs/flux.2-max">Flux.2 Max (top-tier)</option>
                            <option value="black-forest-labs/flux.2-flex" selected>Flux.2 Flex (text &amp; details)</option>
                            <option value="black-forest-labs/flux.2-klein-4b">Flux.2 Klein 4B (fastest)</option>
                        </select>
                    </div>
                    <!-- Prompt -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label for="prompt" class="text-xs uppercase tracking-widest text-zinc-500">Prompt</label>
                            <span id="char-count" class="text-xs text-zinc-600 font-mono">0 / 1000</span>
                        </div>
                        <textarea id="prompt" rows="5" maxlength="1000"
                            class="w-full bg-zinc-950 border border-zinc-700 focus:border-violet-500 rounded-3xl px-5 py-4 text-sm resize-none outline-none"
                            placeholder="A cyberpunk samurai standing on a neon-lit rooftop at dusk, rain reflections, cinematic lighting..."
                            aria-label="Image generation prompt"></textarea>
                    </div>
                    <!-- Image Config -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label for="aspect" class="text-xs uppercase tracking-widest text-zinc-500 mb-2 block">Aspect Ratio</label>
                            <select id="aspect"
                                    class="w-full bg-zinc-950 border border-zinc-700 focus:border-violet-500 rounded-2xl px-5 py-4 text-sm outline-none">
                                <option value="1:1">1:1 Square</option>
                                <option value="16:9" selected>16:9 Landscape</option>
                                <option value="9:16">9:16 Portrait</option>
                                <option value="4:3">4:3</option>
                                <option value="3:2">3:2</option>
                                <option value="21:9">21:9 Ultra-wide</option>
                            </select>
                        </div>
                        <div>
                            <label for="size" class="text-xs uppercase tracking-widest text-zinc-500 mb-2 block">Resolution</label>
                            <select id="size"
                                    class="w-full bg-zinc-950 border border-zinc-700 focus:border-violet-500 rounded-2xl px-5 py-4 text-sm outline-none">
                                <option value="1K">1K (default)</option>
                                <option value="2K">2K</option>
                                <option value="4K">4K (Pro/Max only)</option>
                            </select>
                        </div>
                    </div>
                    <!-- Generate -->
                    <button onclick="generateImage()"
                            id="generate-btn"
                            class="w-full bg-white text-black hover:bg-amber-300 focus-visible:bg-amber-300 transition-all font-semibold py-6 rounded-3xl text-lg flex items-center justify-center gap-3 shadow-xl shadow-violet-500/20"
                            aria-label="Generate image">
                        <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                        GENERATE IMAGE
                    </button>
                    <div id="status" class="text-center text-xs text-emerald-400 font-mono h-6"></div>
                </div>
            </div>
            <!-- Preview / Gallery -->
            <div class="lg:col-span-8">
                <div id="result" class="bg-zinc-900 rounded-3xl p-8 min-h-[500px] flex flex-col items-center justify-center border border-zinc-800">
                    <!-- Empty state -->
                    <div id="empty-state" class="text-center">
                        <div class="w-24 h-24 mx-auto mb-6 bg-zinc-800 rounded-3xl flex items-center justify-center text-6xl opacity-30" aria-hidden="true">✦</div>
                        <p class="text-zinc-500 text-xl">Your Flux.2 image will appear here</p>
                        <p class="text-zinc-600 text-sm mt-2">Enter a prompt and hit Generate</p>
                    </div>
                    <!-- Generated image -->
                    <div id="image-area" class="hidden w-full max-w-2xl">
                        <div class="flex justify-between items-center mb-4">
                            <div id="image-title" class="text-sm font-mono text-zinc-400"></div>
                            <button onclick="downloadImage()"
                                    class="flex items-center gap-2 text-xs uppercase tracking-widest hover:text-white focus-visible:text-white transition-colors"
                                    aria-label="Download generated image as PNG">
                                <i class="fa-solid fa-download" aria-hidden="true"></i>
                                Download PNG
                            </button>
                        </div>
                        <div class="image-container bg-black rounded-3xl overflow-hidden shadow-2xl shadow-black/80 border border-zinc-700">
                            <img id="generated-image" class="w-full h-auto" alt="Generated image">
                        </div>
                        <div id="image-prompt" class="mt-6 text-xs text-zinc-500 font-light leading-relaxed"></div>
                    </div>
                </div>
                <!-- History -->
                <div class="mt-8">
                    <h3 class="text-xs uppercase tracking-widest text-zinc-500 mb-4 flex items-center gap-2">
                        <span>Recent generations</span>
                        <div class="flex-1 h-px bg-zinc-800"></div>
                    </h3>
                    <div id="history" class="grid grid-cols-2 md:grid-cols-4 gap-4" role="list" aria-label="Image generation history"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div class="text-center py-8 text-zinc-600 text-xs">
        Built as a quick demo &bull; Images generated via OpenRouter &bull; Costs real credits
    </div>
    <script>
        tailwind.config = {
            content: [],
            theme: { extend: {} }
        }

        let apiKey = localStorage.getItem('openrouter_key') || ''
        let currentImageData = null
        let currentAbortController = null

        // Safe history load
        let history
        try {
            history = JSON.parse(localStorage.getItem('flux_history') || '[]')
            if (!Array.isArray(history)) history = []
        } catch (e) {
            console.error('Failed to load history:', e)
            history = []
        }

        const PROMPT_MAX_LENGTH = 1000
        const THUMB_MAX_DIM = 300 // max thumbnail dimension for history storage

        const models = {
            "black-forest-labs/flux.2-pro": "Flux.2 Pro",
            "black-forest-labs/flux.2-max": "Flux.2 Max",
            "black-forest-labs/flux.2-flex": "Flux.2 Flex",
            "black-forest-labs/flux.2-klein-4b": "Flux.2 Klein"
        }

        // --- API Key ---

        function loadAPIKey() {
            const keyInput = document.getElementById('api-key')
            keyInput.value = apiKey ? '••••••••' + apiKey.slice(-6) : ''
            updateKeyStatus()
        }

        function saveAPIKey() {
            const keyInput = document.getElementById('api-key')
            const val = keyInput.value.trim()
            if (val.startsWith('sk-or-')) {
                apiKey = val
                localStorage.setItem('openrouter_key', apiKey)
                keyInput.type = 'password'
                keyInput.value = '••••••••' + apiKey.slice(-6)
                document.getElementById('eye-icon').classList.replace('fa-eye-slash', 'fa-eye')
                updateKeyStatus()
            }
        }

        function ensureApiKey() {
            const keyInput = document.getElementById('api-key')
            const val = keyInput.value.trim()
            if (val.startsWith('sk-or-') && val !== apiKey) {
                apiKey = val
                localStorage.setItem('openrouter_key', apiKey)
                updateKeyStatus()
            }
        }

        function toggleKeyVisibility() {
            const input = document.getElementById('api-key')
            const icon = document.getElementById('eye-icon')
            if (input.type === 'password') {
                input.type = 'text'
                if (apiKey) input.value = apiKey
                icon.classList.replace('fa-eye', 'fa-eye-slash')
            } else {
                input.type = 'password'
                if (apiKey) input.value = '••••••••' + apiKey.slice(-6)
                icon.classList.replace('fa-eye-slash', 'fa-eye')
            }
        }

        function updateKeyStatus() {
            const status = document.getElementById('key-status')
            status.textContent = apiKey ? 'KEY SAVED \u2713' : 'NO KEY'
            status.classList.toggle('text-emerald-400', !!apiKey)
        }

        function clearApiKey() {
            if (confirm('Clear saved API key?')) {
                localStorage.removeItem('openrouter_key')
                apiKey = ''
                document.getElementById('api-key').value = ''
                document.getElementById('api-key').type = 'password'
                document.getElementById('eye-icon').classList.replace('fa-eye-slash', 'fa-eye')
                updateKeyStatus()
            }
        }

        // --- Thumbnail generation ---

        function createThumbnail(imageUrl) {
            return new Promise((resolve) => {
                const img = new Image()
                img.crossOrigin = 'anonymous'
                img.onload = () => {
                    const canvas = document.createElement('canvas')
                    let w = img.width, h = img.height
                    if (w > h) {
                        if (w > THUMB_MAX_DIM) { h = h * THUMB_MAX_DIM / w; w = THUMB_MAX_DIM }
                    } else {
                        if (h > THUMB_MAX_DIM) { w = w * THUMB_MAX_DIM / h; h = THUMB_MAX_DIM }
                    }
                    canvas.width = Math.round(w)
                    canvas.height = Math.round(h)
                    const ctx = canvas.getContext('2d')
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
                    resolve(canvas.toDataURL('image/jpeg', 0.7))
                }
                img.onerror = () => resolve(imageUrl) // fallback to original
                img.src = imageUrl
            })
        }

        // --- History ---

        async function addToHistory(prompt, dataUrl, model) {
            const thumbUrl = await createThumbnail(dataUrl)
            const entry = {
                id: Date.now(),
                prompt: prompt.substring(0, 80) + (prompt.length > 80 ? '...' : ''),
                fullPrompt: prompt,
                thumbUrl: thumbUrl,
                fullUrl: dataUrl,
                model: models[model] || model,
                timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            }
            history.unshift(entry)
            if (history.length > 8) history.pop()
            saveHistory()
            renderHistory()
        }

        function saveHistory() {
            // Store only thumbnails in localStorage to avoid quota issues
            const storageHistory = history.map(item => ({
                id: item.id,
                prompt: item.prompt,
                fullPrompt: item.fullPrompt,
                thumbUrl: item.thumbUrl,
                model: item.model,
                timestamp: item.timestamp
            }))
            try {
                localStorage.setItem('flux_history', JSON.stringify(storageHistory))
            } catch (e) {
                console.warn('Failed to save history (quota exceeded), trimming...', e)
                history.pop()
                if (history.length > 0) saveHistory()
            }
        }

        function renderHistory() {
            const container = document.getElementById('history')
            container.innerHTML = ''
            history.forEach(item => {
                const div = document.createElement('div')
                div.className = 'group relative cursor-pointer rounded-2xl overflow-hidden bg-zinc-900 border border-zinc-800 hover:border-violet-500 focus-visible:border-violet-500 transition-colors'
                div.setAttribute('role', 'listitem')
                div.setAttribute('tabindex', '0')
                div.setAttribute('aria-label', 'View: ' + item.prompt)

                const imgUrl = item.thumbUrl || item.dataUrl // compat with old entries
                const img = document.createElement('img')
                img.src = imgUrl
                img.className = 'w-full aspect-video object-cover'
                img.alt = item.prompt

                const overlay = document.createElement('div')
                overlay.className = 'absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-4 text-[10px]'

                const modelLabel = document.createElement('div')
                modelLabel.className = 'font-mono text-amber-300'
                modelLabel.textContent = item.model

                const promptLabel = document.createElement('div')
                promptLabel.className = 'line-clamp-2 text-white/80 text-xs mt-0.5'
                promptLabel.textContent = item.prompt

                overlay.appendChild(modelLabel)
                overlay.appendChild(promptLabel)
                div.appendChild(img)
                div.appendChild(overlay)

                const showItem = () => {
                    const displayUrl = item.fullUrl || item.thumbUrl || item.dataUrl
                    document.getElementById('generated-image').src = displayUrl
                    document.getElementById('generated-image').alt = item.fullPrompt || item.prompt
                    document.getElementById('image-prompt').textContent = item.fullPrompt || item.prompt
                    document.getElementById('image-title').textContent = item.model + ' \u2022 ' + item.timestamp
                    document.getElementById('empty-state').classList.add('hidden')
                    document.getElementById('image-area').classList.remove('hidden')
                    currentImageData = displayUrl
                }
                div.onclick = showItem
                div.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showItem() } }

                container.appendChild(div)
            })
        }

        // --- Prompt validation ---

        function updateCharCount() {
            const prompt = document.getElementById('prompt')
            const counter = document.getElementById('char-count')
            const len = prompt.value.length
            counter.textContent = len + ' / ' + PROMPT_MAX_LENGTH
            counter.classList.toggle('text-red-400', len >= PROMPT_MAX_LENGTH)
            counter.classList.toggle('text-zinc-600', len < PROMPT_MAX_LENGTH)
        }

        // --- Generate ---

        async function generateImage() {
            const promptEl = document.getElementById('prompt')
            const prompt = promptEl.value.trim()
            const model = document.getElementById('model').value
            const aspect = document.getElementById('aspect').value
            const size = document.getElementById('size').value

            // Ensure API key is captured even without blur
            ensureApiKey()

            if (!apiKey) {
                alert('Please enter your OpenRouter API key first!')
                return
            }
            if (!prompt) {
                alert('Please write a prompt!')
                return
            }
            if (prompt.length > PROMPT_MAX_LENGTH) {
                alert('Prompt is too long! Maximum ' + PROMPT_MAX_LENGTH + ' characters.')
                return
            }

            const btn = document.getElementById('generate-btn')
            const status = document.getElementById('status')
            const empty = document.getElementById('empty-state')
            const imageArea = document.getElementById('image-area')

            // Abort any in-flight request
            if (currentAbortController) {
                currentAbortController.abort()
            }
            currentAbortController = new AbortController()

            btn.disabled = true
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i> GENERATING... <span onclick="cancelGeneration(event)" class="ml-2 text-xs underline cursor-pointer hover:text-red-600">[CANCEL]</span>`
            status.textContent = 'Sending request to OpenRouter...'

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Flux.2 HTML Demo'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "user", content: prompt }],
                        modalities: ["image"],
                        image_config: {
                            aspect_ratio: aspect,
                            image_size: size
                        }
                    }),
                    signal: currentAbortController.signal
                })

                if (!response.ok) {
                    const err = await response.json()
                    throw new Error(err.error?.message || 'HTTP ' + response.status)
                }

                const data = await response.json()
                const message = data.choices[0].message
                const imageObj = message.images?.[0]?.image_url?.url

                if (!imageObj) throw new Error("No image returned")

                // Display
                document.getElementById('generated-image').src = imageObj
                document.getElementById('generated-image').alt = prompt
                document.getElementById('image-prompt').textContent = prompt
                document.getElementById('image-title').textContent = models[model] + ' \u2022 Just now'

                empty.classList.add('hidden')
                imageArea.classList.remove('hidden')
                currentImageData = imageObj

                addToHistory(prompt, imageObj, model)
                status.textContent = '\u2705 Image ready!'
                setTimeout(() => status.textContent = '', 3000)
            } catch (err) {
                if (err.name === 'AbortError') {
                    status.innerHTML = '<span class="text-amber-400">Generation cancelled.</span>'
                    setTimeout(() => status.textContent = '', 3000)
                    return
                }
                console.error(err)
                status.innerHTML = '<span class="text-red-400">\u274C ' + escapeHtml(err.message) + '</span>'
                setTimeout(() => status.textContent = '', 5000)
            } finally {
                currentAbortController = null
                btn.disabled = false
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i> GENERATE IMAGE'
            }
        }

        function cancelGeneration(event) {
            event.stopPropagation()
            if (currentAbortController) {
                currentAbortController.abort()
            }
        }

        // --- Download (cross-browser) ---

        function downloadImage() {
            if (!currentImageData) return
            try {
                // Handle both data URLs and regular URLs
                if (currentImageData.startsWith('data:')) {
                    const parts = currentImageData.split(',')
                    const mimeMatch = parts[0].match(/:(.*?);/)
                    const mime = mimeMatch ? mimeMatch[1] : 'image/png'
                    const byteString = atob(parts[1])
                    const ab = new ArrayBuffer(byteString.length)
                    const ia = new Uint8Array(ab)
                    for (let i = 0; i < byteString.length; i++) {
                        ia[i] = byteString.charCodeAt(i)
                    }
                    const blob = new Blob([ab], { type: mime })
                    const url = URL.createObjectURL(blob)
                    const a = document.createElement('a')
                    a.href = url
                    a.download = 'flux2-' + Date.now() + '.png'
                    a.click()
                    URL.revokeObjectURL(url)
                } else {
                    // For regular URLs, fetch and download as blob
                    fetch(currentImageData)
                        .then(r => r.blob())
                        .then(blob => {
                            const url = URL.createObjectURL(blob)
                            const a = document.createElement('a')
                            a.href = url
                            a.download = 'flux2-' + Date.now() + '.png'
                            a.click()
                            URL.revokeObjectURL(url)
                        })
                }
            } catch (e) {
                // Fallback: open in new tab
                window.open(currentImageData, '_blank')
            }
        }

        // --- Utilities ---

        function escapeHtml(str) {
            const div = document.createElement('div')
            div.textContent = str
            return div.innerHTML
        }

        // --- Keyboard shortcut ---

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateImage()
            }
        })

        // --- Init ---

        window.onload = () => {
            loadAPIKey()
            renderHistory()
            updateCharCount()

            document.getElementById('api-key').addEventListener('blur', saveAPIKey)
            document.getElementById('api-key').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { saveAPIKey(); e.target.blur() }
            })
            document.getElementById('prompt').addEventListener('input', updateCharCount)

            console.log('%cFlux.2 HTML interface ready! Paste your OpenRouter key and go.', 'color:#a5b4fc; font-size:10px')
        }
    </script>
</body>
</html>
